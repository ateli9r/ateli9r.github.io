<!DOCTYPE html>
<html>
	<head>
		<title>HyonTak Lee - Senior Software Engineer</title>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
		<link rel="stylesheet" href="/assets/css/ethereal.css" />
		<link rel="stylesheet" href="/assets/css/app.css" />
		<noscript><link rel="stylesheet" href="/assets/css/noscript.css" /></noscript>
	</head>
	<body class="is-preload">

		<!-- Page Wrapper -->
			<div id="page-wrapper">

				<!-- Wrapper -->
					<div id="wrapper">

							<section class="panel banner right">
								<div class="content color0 span-3-75">
									<h1 class="major">HyonTak Lee</h1>
									<p>
										Senior Software Engineer

										<ul class="icons">
											<li>
												<a href="https://github.com/ateli9r/ateli9r.github.io"
													class="icon brands fa-github" target="_blank">
													<span class="label">GitHub</span></a>
											</li>
											<li>
												<a href="https://www.facebook.com/ateli9r"
													class="icon brands fa-facebook-f" target="_blank">
													<span class="label">Facebook</span></a>
											</li>
											<li>
												<a href="mailto:ateli9r@gmail.com"
													class="icon far fa-envelope"><span class="label">E-Mail</span></a>
											</li>
										</ul>
									</p>
									<ul class="actions">
										<li><a href="#story" class="button primary color1 circle icon solid fa-angle-right">Story</a></li>
									</ul>
								</div>
								<div class="image filtered span-1-75" data-position="25% 25%">
									<img src="https://bit.ly/45Ib9fk" alt="" />
								</div>
							</section>

							<section class="panel spotlight large right hidden" id="story">
								<div class="content span-5">
									<h2 class="major">Story</h2>
									<p v-html="content"></p>
								</div>
								<div class="image filtered tinted" data-position="center center">
									<img src="https://bit.ly/3RQNi7t" alt="" />
								</div>
							</section>

							<section class="panel color1 hidden" id="skill">
								<div class="intro joined">
									<h2 class="major">Skill</h2>
									<p v-html="content"></p>
								</div>
								<div class="inner">
									<h4>최근이력</h4>
									<div class="table-wrapper">
										<table>
											<thead>
												<tr>
													<th>고객사</th>
													<th>설명</th>
													<th>기간</th>
												</tr>
											</thead>
											<tbody>
												<tr v-for="item in attachData.items">
													<td>{{ item.customer }}</td>
													<td v-html="item.describe"></td>
													<td>{{ item.dates }}</td>
												</tr>
											</tbody>
										</table>
									</div>
								</div>
							</section>							

							<section class="panel color1 hidden" id="service">
								<div class="intro joined">
									<h2 class="major">Service</h2>
									<p v-html="content"></p>
								</div>
								<div class="inner">
									<ul class="grid-icons three connected">
										<li><span class="icon fa-gem"><span class="label">Value</span></span></li>
										<li><span class="icon solid fa-user"><span class="label">Human</span></span></li>
									</ul>
									<ol>
										<li v-for="item in attachData.items">{{ item.text }}</li>
									</ol>
								</div>
							</section>

							<section class="panel spotlight small left hidden" id="values">
								<div class="content span-7">
									<h2 class="major">Values</h2>
									<p v-html="content"></p>
								</div>
								<div class="image filtered tinted" data-position="center center">
									<img src="https://bit.ly/4chuZR9" alt="" />
								</div>
							</section>

							<section class="panel" id="portfolio">
								<div class="intro color2">
									<h2 class="major">Portfolio</h2>
									<p v-html="content"></p>
								</div>
								<div class="gallery">
									<template v-for="node in attachData.nodes" :key="node">
										<a v-if="node.type == 'item'"
											class="image" v-bind:class="node.class" v-bind:href="node.href"
											data-position="center" v-bind:data-modal="node.modal">
											<div v-if="node.title" class="title">{{ node.title }}</div>
											<img v-bind:src="node.image" alt="" />
										</a>
										<div v-if="node.type == 'group'"
											class="group" v-bind:class="node.class">
											<a v-for="item in node.items" :key="item"
											class="image" v-bind:class="item.class" v-bind:href="item.href"
											data-position="center" v-bind:data-modal="item.modal">
												<div v-if="item.title" class="title">{{ item.title }}</div>
												<img v-bind:src="item.image" alt="" />
											</a>
										</div>
									</template>
								</div>
							</section>

							<div class="copyright">
								© 2024 HyonTak Lee /
								Designed by <a href="https://html5up.net" target="_blank">HTML5 UP</a>
							</div>
					</div>
			</div>

		<!-- Scripts -->
			<script src="/assets/js/jquery.min.js"></script>
			<script src="/assets/js/browser.min.js"></script>
			<script src="/assets/js/breakpoints.min.js"></script>
			<script src="/assets/js/ethereal.js"></script>
			<script src="/assets/js/app.js"></script>
	</body>
</html>
